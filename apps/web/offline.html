<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>当前离线 - Drama 抓马</title>
    <meta name="theme-color" content="#6d28d9" />
    <style>
      :root {
        --bg: #f4f6fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --primary: #6d28d9;
        --line: #e6e8ef;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(1200px 720px at 50% -20%, #ece8ff 0%, var(--bg) 60%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }
      .offline-card {
        width: min(92vw, 420px);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
      }
      .title {
        margin: 0;
        font-size: 22px;
        line-height: 1.3;
      }
      .sub {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 14px;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
      }
      button {
        border: none;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      .primary { background: var(--primary); color: #fff; }
      .ghost { background: #f0ebff; color: #4f1db1; }
    </style>
  </head>
  <body>
    <section class="offline-card">
      <h1 class="title">当前网络不可用</h1>
      <p class="sub">你已进入离线模式。恢复网络后可继续访问完整内容。</p>
      <div class="actions">
        <button class="primary" onclick="location.reload()">重试</button>
        <button class="ghost" onclick="location.href='/'">返回首页</button>
      </div>
    </section>
  </body>
</html>
